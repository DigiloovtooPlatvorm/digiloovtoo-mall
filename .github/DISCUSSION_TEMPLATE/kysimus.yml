title: "[Küsimus] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Esita küsimus võimalikult täpselt, et teised saaksid kiiresti aidata.

  - type: input
    id: teema
    attributes:
      label: Teema
      description: Millega küsimus seotud on?
      placeholder: Näiteks wiki, issue, projektikirjeldus, analüüs
    validations:
      required: true

  - type: textarea
    id: kirjeldus
    attributes:
      label: Küsimuse kirjeldus
      description: Kirjelda, mis jäi arusaamatuks või mida soovid teada.
      placeholder: Kirjuta siia oma küsimus
    validations:
      required: true

  - type: dropdown
    id: seotud_osa
    attributes:
      label: Seotud repo osa
      options:
        - README
        - projekti-kirjeldus.md
        - juhendid
        - projekti-analuus
        - docs
        - muu
    validations:
      required: true

  - type: checkboxes
    id: kontroll
    attributes:
      label: Kontroll
      options:
        - label: Vaatasin enne README ja juhendid üle
        - label: Otsisin, kas sama küsimus on juba varem küsitud
